<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFC記録 - ChatGPT Diet App</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* Tab Navigation */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 -2px 20px rgba(0,0,0,0.1);
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .tab-item {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            cursor: pointer;
            transition: color 0.3s, background 0.3s;
            border: none;
            background: none;
            font-size: 0.7rem;
            color: #999;
            font-weight: 500;
        }

        .tab-item.active {
            color: #667eea;
        }

        .tab-icon {
            font-size: 1.4rem;
            display: block;
            margin-bottom: 2px;
        }

        .tab-page {
            display: none;
        }

        .tab-page.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .date-input {
            margin-bottom: 20px;
        }

        .date-input label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .date-input input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }

        .meal-section {
            margin-bottom: 20px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .meal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .meal-icon {
            font-size: 1.5rem;
        }

        .meal-title {
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
        }

        .meal-section textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            resize: vertical;
            min-height: 60px;
            transition: border-color 0.3s;
        }

        .meal-section textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .photo-upload {
            margin-top: 12px;
        }

        .photo-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: #e8f0fe;
            border: 2px dashed #667eea;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            color: #667eea;
            font-weight: 500;
        }

        .photo-upload-label:hover {
            background: #d4e2fc;
        }

        .photo-upload input[type="file"] {
            display: none;
        }

        .photo-preview {
            margin-top: 10px;
            display: none;
        }

        .photo-preview.show {
            display: block;
        }

        .photo-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .photo-preview .remove-btn {
            display: block;
            margin-top: 8px;
            padding: 8px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        button.submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button.submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result {
            display: none;
        }

        .result.show {
            display: block;
        }

        .pfc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .pfc-item {
            text-align: center;
            padding: 16px 8px;
            background: #f5f5f5;
            border-radius: 12px;
        }

        .pfc-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #333;
        }

        .pfc-label {
            font-size: 0.75rem;
            color: #666;
            margin-top: 4px;
        }

        .pfc-item.protein { background: #e3f2fd; }
        .pfc-item.protein .pfc-value { color: #1976d2; }

        .pfc-item.fat { background: #fff3e0; }
        .pfc-item.fat .pfc-value { color: #f57c00; }

        .pfc-item.carbs { background: #e8f5e9; }
        .pfc-item.carbs .pfc-value { color: #388e3c; }

        .pfc-item.calories { background: #fce4ec; }
        .pfc-item.calories .pfc-value { color: #c2185b; }

        .ai-comment {
            background: #f0f4ff;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .ai-comment-label {
            font-size: 0.8rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .generated-image {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .caption-box {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .action-buttons button {
            padding: 14px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary {
            background: #333;
            color: white;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .new-record-btn {
            margin-top: 20px;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .meal-breakfast { border-left: 4px solid #FFB74D; }
        .meal-lunch { border-left: 4px solid #4CAF50; }
        .meal-dinner { border-left: 4px solid #5C6BC0; }
        .meal-snack { border-left: 4px solid #EC407A; }

        /* Calendar Styles */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .calendar-nav button {
            background: none;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .calendar-nav .month-label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 16px;
        }

        .calendar-weekday {
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #999;
            padding: 8px 0;
        }

        .calendar-day {
            text-align: center;
            padding: 8px 4px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            min-height: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .calendar-day:hover {
            background: #f0f4ff;
        }

        .calendar-day.empty {
            cursor: default;
        }

        .calendar-day.empty:hover {
            background: none;
        }

        .calendar-day.today {
            border: 2px solid #667eea;
        }

        .calendar-day.has-data {
            background: #e8f0fe;
        }

        .calendar-day.has-data:hover {
            background: #d4e2fc;
        }

        .calendar-day .day-number {
            font-weight: 600;
            color: #333;
        }

        .calendar-day .day-cal {
            font-size: 0.6rem;
            color: #667eea;
            font-weight: 600;
            margin-top: 2px;
        }

        .calendar-day.selected {
            background: #667eea;
        }

        .calendar-day.selected .day-number {
            color: white;
        }

        .calendar-day.selected .day-cal {
            color: rgba(255,255,255,0.8);
        }

        .day-detail {
            display: none;
        }

        .day-detail.show {
            display: block;
        }

        .day-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .day-detail-header h3 {
            font-size: 1rem;
            color: #333;
        }

        .day-detail-close {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #999;
        }

        .day-meal-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .day-meal-desc {
            font-size: 0.9rem;
            color: #333;
            margin-bottom: 6px;
        }

        .day-meal-pfc {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            color: #666;
        }

        .day-meal-pfc span {
            font-weight: 600;
        }

        .day-total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
        }

        .day-total-label {
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .day-total-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .day-total-item {
            text-align: center;
        }

        .day-total-value {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .day-total-unit {
            color: rgba(255,255,255,0.7);
            font-size: 0.65rem;
        }

        /* Graph Styles */
        .graph-period {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .graph-period button {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
        }

        .graph-period button.active {
            border-color: #667eea;
            color: #667eea;
            background: #f0f4ff;
        }

        .chart-container {
            position: relative;
            height: 250px;
            margin-bottom: 20px;
        }

        .chart-card-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .no-data-message {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ PFC記録</h1>

        <!-- Tab 1: Input Page -->
        <div class="tab-page active" id="tabInput">
            <!-- Input Form -->
            <div class="card" id="inputCard">
                <div class="date-input">
                    <label for="dateInput">📅 日付</label>
                    <input type="date" id="dateInput">
                </div>

                <div class="meal-section meal-breakfast">
                    <div class="meal-header">
                        <span class="meal-icon">🌅</span>
                        <span class="meal-title">朝ごはん</span>
                    </div>
                    <textarea id="breakfastInput" placeholder="例：トースト、目玉焼き、コーヒー"></textarea>
                    <div class="photo-upload">
                        <label class="photo-upload-label" for="breakfastPhoto">📷 写真を追加</label>
                        <input type="file" id="breakfastPhoto" accept="image/*" onchange="previewPhoto('breakfast')">
                        <div class="photo-preview" id="breakfastPreview">
                            <img id="breakfastPreviewImg" src="">
                            <button class="remove-btn" onclick="removePhoto('breakfast')">写真を削除</button>
                        </div>
                    </div>
                </div>

                <div class="meal-section meal-lunch">
                    <div class="meal-header">
                        <span class="meal-icon">☀️</span>
                        <span class="meal-title">昼ごはん</span>
                    </div>
                    <textarea id="lunchInput" placeholder="例：サラダチキン、味噌汁、ご飯"></textarea>
                    <div class="photo-upload">
                        <label class="photo-upload-label" for="lunchPhoto">📷 写真を追加</label>
                        <input type="file" id="lunchPhoto" accept="image/*" onchange="previewPhoto('lunch')">
                        <div class="photo-preview" id="lunchPreview">
                            <img id="lunchPreviewImg" src="">
                            <button class="remove-btn" onclick="removePhoto('lunch')">写真を削除</button>
                        </div>
                    </div>
                </div>

                <div class="meal-section meal-dinner">
                    <div class="meal-header">
                        <span class="meal-icon">🌙</span>
                        <span class="meal-title">夜ごはん</span>
                    </div>
                    <textarea id="dinnerInput" placeholder="例：焼き魚、サラダ、豆腐"></textarea>
                    <div class="photo-upload">
                        <label class="photo-upload-label" for="dinnerPhoto">📷 写真を追加</label>
                        <input type="file" id="dinnerPhoto" accept="image/*" onchange="previewPhoto('dinner')">
                        <div class="photo-preview" id="dinnerPreview">
                            <img id="dinnerPreviewImg" src="">
                            <button class="remove-btn" onclick="removePhoto('dinner')">写真を削除</button>
                        </div>
                    </div>
                </div>

                <div class="meal-section meal-snack">
                    <div class="meal-header">
                        <span class="meal-icon">🍪</span>
                        <span class="meal-title">間食</span>
                    </div>
                    <textarea id="snackInput" placeholder="例：プロテインバー、ナッツ"></textarea>
                    <div class="photo-upload">
                        <label class="photo-upload-label" for="snackPhoto">📷 写真を追加</label>
                        <input type="file" id="snackPhoto" accept="image/*" onchange="previewPhoto('snack')">
                        <div class="photo-preview" id="snackPreview">
                            <img id="snackPreviewImg" src="">
                            <button class="remove-btn" onclick="removePhoto('snack')">写真を削除</button>
                        </div>
                    </div>
                </div>

                <button class="submit-btn" id="submitBtn" onclick="submitMeal()">
                    PFCを計算する
                </button>
            </div>

            <!-- Loading -->
            <div class="card loading" id="loadingCard">
                <div class="spinner"></div>
                <p>AIが分析中...</p>
                <p style="font-size: 0.9rem; color: #666; margin-top: 8px;">画像生成に時間がかかる場合があります</p>
            </div>

            <!-- Error -->
            <div class="error" id="errorBox"></div>

            <!-- Result -->
            <div class="card result" id="resultCard">
                <div class="pfc-grid">
                    <div class="pfc-item protein">
                        <div class="pfc-value" id="proteinValue">-</div>
                        <div class="pfc-label">タンパク質(g)</div>
                    </div>
                    <div class="pfc-item fat">
                        <div class="pfc-value" id="fatValue">-</div>
                        <div class="pfc-label">脂質(g)</div>
                    </div>
                    <div class="pfc-item carbs">
                        <div class="pfc-value" id="carbsValue">-</div>
                        <div class="pfc-label">炭水化物(g)</div>
                    </div>
                    <div class="pfc-item calories">
                        <div class="pfc-value" id="caloriesValue">-</div>
                        <div class="pfc-label">kcal</div>
                    </div>
                </div>

                <div class="ai-comment">
                    <div class="ai-comment-label">💬 AIコメント</div>
                    <div id="aiComment">-</div>
                </div>

                <img class="generated-image" id="generatedImage" src="" alt="生成画像">

                <label>📝 キャプション</label>
                <div class="caption-box" id="captionBox"></div>

                <div class="action-buttons">
                    <button class="btn-secondary" onclick="copyCaption()">📋 コピー</button>
                    <button class="btn-secondary" onclick="downloadImage()">💾 画像保存</button>
                </div>

                <button class="new-record-btn" onclick="newRecord()">➕ 新しく記録する</button>
            </div>
        </div>

        <!-- Tab 2: Calendar Page -->
        <div class="tab-page" id="tabCalendar">
            <div class="card">
                <div class="calendar-nav">
                    <button onclick="changeMonth(-1)">◀ 前月</button>
                    <span class="month-label" id="calendarMonthLabel"></span>
                    <button onclick="changeMonth(1)">次月 ▶</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div class="card day-detail" id="dayDetail">
                <div class="day-detail-header">
                    <h3 id="dayDetailTitle"></h3>
                    <button class="day-detail-close" onclick="closeDayDetail()">✕</button>
                </div>
                <div id="dayDetailContent"></div>
            </div>
        </div>

        <!-- Tab 3: Graph Page -->
        <div class="tab-page" id="tabGraph">
            <div class="card">
                <div class="graph-period">
                    <button class="active" onclick="setGraphPeriod(7, this)">1週間</button>
                    <button onclick="setGraphPeriod(30, this)">1ヶ月</button>
                    <button onclick="setGraphPeriod(90, this)">3ヶ月</button>
                </div>
            </div>

            <div class="card">
                <div class="chart-card-title">🔥 カロリー推移 (kcal)</div>
                <div class="chart-container">
                    <canvas id="caloriesChart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="chart-card-title">💪 タンパク質推移 (g)</div>
                <div class="chart-container">
                    <canvas id="proteinChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
        <button class="tab-item active" onclick="switchTab('tabInput', this)">
            <span class="tab-icon">✏️</span>
            記録する
        </button>
        <button class="tab-item" onclick="switchTab('tabCalendar', this)">
            <span class="tab-icon">📅</span>
            カレンダー
        </button>
        <button class="tab-item" onclick="switchTab('tabGraph', this)">
            <span class="tab-icon">📊</span>
            グラフ
        </button>
    </nav>

    <script>
        const API_KEY = '26c128ce99310f92692f649f3c15abc17a8927344e2fb527a5c41e82feec8fd4';
        let currentImageBase64 = '';
        let currentCaption = '';
        const photoData = { breakfast: null, lunch: null, dinner: null, snack: null };

        // Calendar state
        let calendarYear, calendarMonth;
        let calendarData = {};
        let historyCache = {};

        // Graph state
        let caloriesChart = null;
        let proteinChart = null;
        let currentGraphDays = 7;

        // Init date
        document.getElementById('dateInput').valueAsDate = new Date();

        // ========== Tab Switching ==========
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');

            if (tabId === 'tabCalendar') {
                const now = new Date();
                calendarYear = now.getFullYear();
                calendarMonth = now.getMonth();
                loadCalendar();
            } else if (tabId === 'tabGraph') {
                loadGraph(currentGraphDays);
            }
        }

        // ========== Photo Functions ==========
        function previewPhoto(mealType) {
            const input = document.getElementById(`${mealType}Photo`);
            const preview = document.getElementById(`${mealType}Preview`);
            const previewImg = document.getElementById(`${mealType}PreviewImg`);

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    preview.classList.add('show');
                    photoData[mealType] = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removePhoto(mealType) {
            const input = document.getElementById(`${mealType}Photo`);
            const preview = document.getElementById(`${mealType}Preview`);
            const previewImg = document.getElementById(`${mealType}PreviewImg`);
            input.value = '';
            previewImg.src = '';
            preview.classList.remove('show');
            photoData[mealType] = null;
        }

        // ========== Submit Meal ==========
        async function submitMeal() {
            const date = document.getElementById('dateInput').value;
            const breakfast = document.getElementById('breakfastInput').value.trim();
            const lunch = document.getElementById('lunchInput').value.trim();
            const dinner = document.getElementById('dinnerInput').value.trim();
            const snack = document.getElementById('snackInput').value.trim();

            if (!breakfast && !lunch && !dinner && !snack) {
                alert('少なくとも1つの食事を入力してください');
                return;
            }

            const meals = [];
            if (breakfast) meals.push({ meal_type: 'breakfast', description: breakfast, image_base64: photoData.breakfast });
            if (lunch) meals.push({ meal_type: 'lunch', description: lunch, image_base64: photoData.lunch });
            if (dinner) meals.push({ meal_type: 'dinner', description: dinner, image_base64: photoData.dinner });
            if (snack) meals.push({ meal_type: 'snack', description: snack, image_base64: photoData.snack });

            const requestBody = { date: date + 'T00:00:00', meals: meals };

            document.getElementById('inputCard').style.display = 'none';
            document.getElementById('loadingCard').classList.add('show');
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('errorBox').classList.remove('show');

            try {
                const response = await fetch('/api/v1/meal/post?auto_post=false', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || 'APIエラーが発生しました');
                displayResult(data, meals);
            } catch (error) {
                document.getElementById('errorBox').textContent = error.message;
                document.getElementById('errorBox').classList.add('show');
                document.getElementById('inputCard').style.display = 'block';
            } finally {
                document.getElementById('loadingCard').classList.remove('show');
            }
        }

        function displayResult(data, meals) {
            document.getElementById('proteinValue').textContent = data.pfc.protein;
            document.getElementById('fatValue').textContent = data.pfc.fat;
            document.getElementById('carbsValue').textContent = data.pfc.carbs;
            document.getElementById('caloriesValue').textContent = data.pfc.calories;
            document.getElementById('aiComment').textContent = data.pfc.comment || '-';

            currentImageBase64 = data.image_base64;
            document.getElementById('generatedImage').src = `data:image/jpeg;base64,${data.image_base64}`;

            const mealSummary = meals.map(m => {
                const icons = { breakfast: '🌅', lunch: '☀️', dinner: '🌙', snack: '🍪' };
                return `${icons[m.meal_type]} ${m.description}`;
            }).join('\n');

            currentCaption = `${data.caption}\n\n📊 本日の食事\n${mealSummary}\n\n📈 PFC詳細\nP: ${data.pfc.protein}g / F: ${data.pfc.fat}g / C: ${data.pfc.carbs}g\n🔥 ${data.pfc.calories}kcal\n\n💬 ${data.pfc.comment || ''}`;
            document.getElementById('captionBox').textContent = currentCaption;
            document.getElementById('resultCard').classList.add('show');
        }

        function copyCaption() {
            navigator.clipboard.writeText(currentCaption).then(() => {
                alert('クリップボードにコピーしました！');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = currentCaption;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('クリップボードにコピーしました！');
            });
        }

        function downloadImage() {
            const link = document.createElement('a');
            link.href = `data:image/jpeg;base64,${currentImageBase64}`;
            link.download = `pfc_${document.getElementById('dateInput').value}.jpg`;
            link.click();
        }

        function newRecord() {
            document.getElementById('inputCard').style.display = 'block';
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('breakfastInput').value = '';
            document.getElementById('lunchInput').value = '';
            document.getElementById('dinnerInput').value = '';
            document.getElementById('snackInput').value = '';
            document.getElementById('errorBox').classList.remove('show');
            ['breakfast', 'lunch', 'dinner', 'snack'].forEach(removePhoto);
            document.getElementById('dateInput').valueAsDate = new Date();
        }

        // ========== Calendar ==========
        async function loadCalendar() {
            const startDate = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-01`;
            const lastDay = new Date(calendarYear, calendarMonth + 1, 0).getDate();
            const endDate = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;

            document.getElementById('calendarMonthLabel').textContent = `${calendarYear}年${calendarMonth + 1}月`;

            try {
                const response = await fetch(`/api/v1/meal/history?start_date=${startDate}&end_date=${endDate}`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const logs = await response.json();

                // Group by date
                calendarData = {};
                historyCache = {};
                logs.forEach(log => {
                    if (!calendarData[log.date]) {
                        calendarData[log.date] = { calories: 0, protein: 0, fat: 0, carbs: 0, meals: [] };
                    }
                    calendarData[log.date].calories += log.calories;
                    calendarData[log.date].protein += log.protein;
                    calendarData[log.date].fat += log.fat;
                    calendarData[log.date].carbs += log.carbs;
                    calendarData[log.date].meals.push(log);
                });
                historyCache = calendarData;
            } catch (e) {
                calendarData = {};
            }

            renderCalendar();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            let html = weekdays.map(d => `<div class="calendar-weekday">${d}</div>`).join('');

            const firstDayOfWeek = new Date(calendarYear, calendarMonth, 1).getDay();
            const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();

            for (let i = 0; i < firstDayOfWeek; i++) {
                html += '<div class="calendar-day empty"></div>';
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const data = calendarData[dateStr];
                const isToday = dateStr === todayStr;
                const hasData = !!data;

                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (hasData) classes += ' has-data';

                let calLabel = '';
                if (hasData) {
                    calLabel = `<span class="day-cal">${Math.round(data.calories)}kcal</span>`;
                }

                html += `<div class="${classes}" onclick="showDayDetail('${dateStr}')">
                    <span class="day-number">${day}</span>
                    ${calLabel}
                </div>`;
            }

            grid.innerHTML = html;
        }

        function changeMonth(delta) {
            calendarMonth += delta;
            if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
            if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
            closeDayDetail();
            loadCalendar();
        }

        function showDayDetail(dateStr) {
            const data = calendarData[dateStr];
            const detail = document.getElementById('dayDetail');
            const title = document.getElementById('dayDetailTitle');
            const content = document.getElementById('dayDetailContent');

            // Highlight selected day
            document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
            const days = document.querySelectorAll('.calendar-day');
            const dayNum = parseInt(dateStr.split('-')[2]);
            days.forEach(d => {
                const num = d.querySelector('.day-number');
                if (num && parseInt(num.textContent) === dayNum && !d.classList.contains('empty')) {
                    d.classList.add('selected');
                }
            });

            const parts = dateStr.split('-');
            title.textContent = `${parseInt(parts[1])}月${parseInt(parts[2])}日の記録`;

            if (!data || data.meals.length === 0) {
                content.innerHTML = '<div class="no-data-message">この日の記録はありません</div>';
                detail.classList.add('show');
                return;
            }

            let html = '';
            data.meals.forEach(meal => {
                html += `<div class="day-meal-item">
                    <div class="day-meal-desc">${meal.meal_description || '(説明なし)'}</div>
                    <div class="day-meal-pfc">
                        <span style="color:#1976d2">P: ${meal.protein}g</span>
                        <span style="color:#f57c00">F: ${meal.fat}g</span>
                        <span style="color:#388e3c">C: ${meal.carbs}g</span>
                        <span style="color:#c2185b">${meal.calories}kcal</span>
                    </div>
                </div>`;
            });

            html += `<div class="day-total">
                <div class="day-total-label">1日の合計</div>
                <div class="day-total-grid">
                    <div class="day-total-item">
                        <div class="day-total-value">${Math.round(data.protein)}g</div>
                        <div class="day-total-unit">タンパク質</div>
                    </div>
                    <div class="day-total-item">
                        <div class="day-total-value">${Math.round(data.fat)}g</div>
                        <div class="day-total-unit">脂質</div>
                    </div>
                    <div class="day-total-item">
                        <div class="day-total-value">${Math.round(data.carbs)}g</div>
                        <div class="day-total-unit">炭水化物</div>
                    </div>
                    <div class="day-total-item">
                        <div class="day-total-value">${Math.round(data.calories)}</div>
                        <div class="day-total-unit">kcal</div>
                    </div>
                </div>
            </div>`;

            content.innerHTML = html;
            detail.classList.add('show');
        }

        function closeDayDetail() {
            document.getElementById('dayDetail').classList.remove('show');
            document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
        }

        // ========== Graph ==========
        function setGraphPeriod(days, btn) {
            document.querySelectorAll('.graph-period button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGraphDays = days;
            loadGraph(days);
        }

        async function loadGraph(days) {
            try {
                const response = await fetch(`/api/v1/meal/daily-summary?days=${days}`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await response.json();

                // Sort by date ascending
                data.sort((a, b) => a.date.localeCompare(b.date));

                const labels = data.map(d => {
                    const parts = d.date.split('-');
                    return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
                });
                const calories = data.map(d => Math.round(d.total_calories));
                const protein = data.map(d => Math.round(d.total_protein));

                renderChart('caloriesChart', caloriesChart, labels, calories, 'カロリー (kcal)', '#c2185b', '#fce4ec', chart => { caloriesChart = chart; });
                renderChart('proteinChart', proteinChart, labels, protein, 'タンパク質 (g)', '#1976d2', '#e3f2fd', chart => { proteinChart = chart; });
            } catch (e) {
                // Charts will remain empty
            }
        }

        function renderChart(canvasId, existingChart, labels, data, label, borderColor, bgColor, setChart) {
            if (existingChart) existingChart.destroy();

            const ctx = document.getElementById(canvasId).getContext('2d');

            if (data.length === 0) {
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                ctx.font = '14px -apple-system, sans-serif';
                ctx.fillStyle = '#999';
                ctx.textAlign = 'center';
                ctx.fillText('データがありません', ctx.canvas.width / 2, ctx.canvas.height / 2);
                setChart(null);
                return;
            }

            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: borderColor,
                        backgroundColor: bgColor,
                        borderWidth: 2.5,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 4,
                        pointBackgroundColor: borderColor,
                        pointBorderColor: 'white',
                        pointBorderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            cornerRadius: 8,
                            padding: 12,
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { font: { size: 11 }, maxRotation: 45 }
                        },
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f0f0f0' },
                            ticks: { font: { size: 11 } }
                        }
                    }
                }
            });
            setChart(chart);
        }
    </script>
</body>
</html>
